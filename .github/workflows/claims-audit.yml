name: Claims audit guard

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  claims-audit:
    name: claims audit participation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require audit update or explicit exemption
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          changed = subprocess.check_output(
              ["git", "diff", "--name-only", os.environ["BASE_SHA"], os.environ["HEAD_SHA"]],
              text=True,
          ).splitlines()

          package_changed = any(path.startswith("zeromodel/") for path in changed)
          audit_changed = "docs/claims-audit.md" in changed

          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          body = (event.get("pull_request") or {}).get("body") or ""
          exemption = re.search(r"(?im)^Audit-Exempt:\s*\S.+$", body)

          print("Changed files:")
          for path in changed:
              print(" -", path)

          if not package_changed:
              print("No zeromodel package files changed; claims-audit participation is not required.")
          elif audit_changed:
              print("docs/claims-audit.md changed with the package implementation.")
          elif exemption:
              print("Explicit claims-audit exemption found:", exemption.group(0))
          else:
              raise SystemExit(
                  "Package code changed without docs/claims-audit.md. "
                  "Update the audit or add a reasoned PR-body line such as: "
                  "Audit-Exempt: internal refactor; no claim status changed."
              )
          PY
