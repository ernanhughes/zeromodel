name: Core package

on:
  pull_request:
    paths:
      - "packages/core/**"
      - "package-boundaries.toml"
      - "scripts/check_package_boundaries.py"
      - ".github/workflows/core-package.yml"
  push:
    branches:
      - main
    paths:
      - "packages/core/**"
      - "package-boundaries.toml"
      - "scripts/check_package_boundaries.py"
      - ".github/workflows/core-package.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest ruff mypy

      - name: Core quality
        run: |
          python -m ruff format --check packages/core/src packages/core/tests
          python -m ruff check packages/core/src packages/core/tests
          python -m mypy packages/core/src

      - name: Package boundaries
        run: python scripts/check_package_boundaries.py

      - name: Build core wheel
        run: |
          rm -rf packages/core/dist packages/core/build
          python -m build packages/core
          python -m twine check packages/core/dist/*

      - name: Test installed core wheel
        run: |
          python -m venv build/core-ci-venv
          build/core-ci-venv/bin/python -m pip install --upgrade pip
          build/core-ci-venv/bin/python -m pip install pytest
          build/core-ci-venv/bin/python -m pip install packages/core/dist/zeromodel-1.0.13-py3-none-any.whl
          build/core-ci-venv/bin/python -m pip check
          CORE_WHEEL_PATH="$PWD/packages/core/dist/zeromodel-1.0.13-py3-none-any.whl" \
            build/core-ci-venv/bin/python -m pytest -q packages/core/tests
