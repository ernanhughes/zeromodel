name: observation-package

on:
  push:
    paths:
      - "packages/core/**"
      - "packages/observation/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/observation-package.yml"
  pull_request:
    paths:
      - "packages/core/**"
      - "packages/observation/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/observation-package.yml"

jobs:
  validate-observation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest ruff mypy "numpy<2.0"
      - name: Build core and observation wheels
        run: |
          python -m build packages/core
          python -m twine check packages/core/dist/*
          python -m build packages/observation
          python -m twine check packages/observation/dist/*
      - name: Lint and type-check observation
        run: |
          python -m ruff check packages/observation/src packages/observation/tests
          python -m ruff format --check packages/observation/src packages/observation/tests
          python -m mypy packages/observation/src
      - name: Check package boundaries
        run: python scripts/check_package_boundaries.py
      - name: Install wheels in clean environment
        shell: pwsh
        run: |
          python -m venv build/observation-ci-venv
          $python = "build/observation-ci-venv/Scripts/python.exe"
          & $python -m pip install --upgrade pip
          & $python -m pip install pytest
          & $python -m pip install packages/core/dist/zeromodel-1.0.13-py3-none-any.whl
          & $python -m pip install packages/observation/dist/zeromodel_observation-1.0.13-py3-none-any.whl
          & $python -m pip check
          $env:OBSERVATION_WHEEL_PATH = "$PWD/packages/observation/dist/zeromodel_observation-1.0.13-py3-none-any.whl"
          & $python -m pytest -q packages/observation/tests
      - name: Verify installed import locations
        shell: pwsh
        run: |
          $python = "build/observation-ci-venv/Scripts/python.exe"
          & $python -c "import inspect, zeromodel.core, zeromodel.observation; print(inspect.getfile(zeromodel.core)); print(inspect.getfile(zeromodel.observation))"
