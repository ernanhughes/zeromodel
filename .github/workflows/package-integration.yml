name: Package integration

on:
  pull_request:
    paths:
      - "packages/**"
      - "tests/**"
      - "integration_tests/**"
      - "scripts/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "package-boundaries.toml"
      - "quality-baseline.toml"
      - ".github/workflows/package-integration.yml"
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "tests/**"
      - "integration_tests/**"
      - "scripts/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "package-boundaries.toml"
      - "quality-baseline.toml"
      - ".github/workflows/package-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-integration:
    name: six-package release candidate / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Fast suite
        run: python scripts/run_fast_tests.py

      - name: Quality gate
        run: python scripts/check_quality.py

      - name: Release-candidate package validation
        run: python scripts/validate_release_candidate.py
