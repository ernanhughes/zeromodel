name: PR 71 consolidate release validator

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  consolidate:
    if: github.event.pull_request.number == 71 && github.event.pull_request.head.ref == 'fix/pre-audit-main-stabilization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pre-audit-main-stabilization
          fetch-depth: 0
      - name: Consolidate validator implementation
        run: |
          python - <<'PY'
          from pathlib import Path

          impl = Path('scripts/_validate_release_candidate_impl.py')
          target = Path('scripts/validate_release_candidate.py')
          if not impl.exists():
              raise SystemExit(0)
          text = impl.read_text(encoding='utf-8')
          old_doc = '''    layer collected/ran zero relevant tests (`passed + failed + errors +
              skipped == 0` - pytest's own "no tests ran" case); or the layer's
              result is entirely missing from the report.
          '''.replace('              ', '    ')
          new_doc = '''    layer collected zero relevant tests; the layer collected tests but
              executed none (all selected tests were skipped); or the layer's result
              is entirely missing from the report.
          '''.replace('              ', '    ')
          old = '''    failed = int(counts.get("failed") or 0)
              if failed:
                  reasons.append(f"failed={failed}")
              errors = int(counts.get("errors") or 0)
              if errors:
                  reasons.append(f"errors={errors}")
              total = sum(int(counts.get(key) or 0) for key in _COUNT_KEYS)
              if total == 0:
                  reasons.append("collected zero relevant tests")
          '''.replace('              ', '    ')
          new = '''    passed = int(counts.get("passed") or 0)
              failed = int(counts.get("failed") or 0)
              errors = int(counts.get("errors") or 0)
              skipped = int(counts.get("skipped") or 0)
              if failed:
                  reasons.append(f"failed={failed}")
              if errors:
                  reasons.append(f"errors={errors}")
              collected = passed + failed + errors + skipped
              executed = passed + failed + errors
              if collected == 0:
                  reasons.append("collected zero relevant tests")
              elif executed == 0:
                  reasons.append(
                      "executed zero required tests; all collected tests were skipped"
                  )
          '''.replace('              ', '    ')
          if text.count(old) != 1 or text.count(old_doc) != 1:
              raise SystemExit('release validator consolidation contract changed')
          text = text.replace(old_doc, new_doc).replace(old, new)
          target.write_text(text, encoding='utf-8')
          impl.unlink()
          PY
      - name: Commit consolidated validator
        run: |
          if git diff --quiet -- scripts/validate_release_candidate.py scripts/_validate_release_candidate_impl.py; then
            echo "Validator already consolidated"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/validate_release_candidate.py scripts/_validate_release_candidate_impl.py
          git commit -m "refactor(release): keep one validator authority"
          git push origin HEAD:fix/pre-audit-main-stabilization
