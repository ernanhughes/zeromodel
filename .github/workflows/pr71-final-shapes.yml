name: PR 71 apply final shape fixes

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.number == 71 && github.event.pull_request.head.ref == 'fix/pre-audit-main-stabilization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pre-audit-main-stabilization
          fetch-depth: 0
      - name: Install formatting tool
        run: python -m pip install ruff
      - name: Correct fixed-length shape construction and formatting
        run: |
          python - <<'PY'
          from pathlib import Path

          hierarchy = Path('packages/analysis/src/zeromodel/analysis/hierarchy.py')
          text = hierarchy.read_text(encoding='utf-8')
          text = text.replace(
              'level=0, field=current, reduction="source", source_shape=current.shape',
              'level=0,\n                field=current,\n                reduction="source",\n                source_shape=(int(current.shape[0]), int(current.shape[1])),',
          )
          text = text.replace(
              'source_shape=current.shape,',
              'source_shape=(int(current.shape[0]), int(current.shape[1])),',
          )
          hierarchy.write_text(text, encoding='utf-8')

          transformations = Path('packages/video/src/zeromodel/video/domains/video_action_set/transformations.py')
          text = transformations.read_text(encoding='utf-8')
          start = text.index(
              '    _validate_transformation_parameters(\n',
              text.index('def _apply_transformation'),
          )
          end = text.index('    result = np.array(source, copy=True)\n', start)
          block = '''    _validate_transformation_parameters(
              params,
              image_shape=(int(source.shape[0]), int(source.shape[1])),
          )
          '''.replace('          ', '    ')
          text = text[:start] + block + text[end:]
          transformations.write_text(text, encoding='utf-8')
          PY
          python -m ruff format packages/analysis/src/zeromodel/analysis/hierarchy.py packages/video/src/zeromodel/video/domains/video_action_set/transformations.py
      - name: Commit final shape fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/analysis/src/zeromodel/analysis/hierarchy.py packages/video/src/zeromodel/video/domains/video_action_set/transformations.py
          git commit -m "fix: make hierarchy and transformation shapes explicit"
          git push origin HEAD:fix/pre-audit-main-stabilization
