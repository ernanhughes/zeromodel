name: PR 71 apply shape typing fix

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.number == 71 && github.event.pull_request.head.ref == 'fix/pre-audit-main-stabilization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pre-audit-main-stabilization
          fetch-depth: 0
      - name: Apply fixed-length shape typing corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          core = Path('packages/core/src/zeromodel/core/artifact.py')
          text = core.read_text(encoding='utf-8')
          old_score = '''    @property
              def shape(self) -> Tuple[int, int]:
                  return self.values.shape
          '''.replace('              ', '    ')
          new_score = '''    @property
              def shape(self) -> Tuple[int, int]:
                  return (int(self.values.shape[0]), int(self.values.shape[1]))
          '''.replace('              ', '    ')
          old_vpm = '''    @property
              def shape(self) -> Tuple[int, int]:
                  return self.normalized_values.shape
          '''.replace('              ', '    ')
          new_vpm = '''    @property
              def shape(self) -> Tuple[int, int]:
                  return (
                      int(self.normalized_values.shape[0]),
                      int(self.normalized_values.shape[1]),
                  )
          '''.replace('              ', '    ')
          if text.count(old_score) != 1 or text.count(old_vpm) != 1:
              raise SystemExit('core shape replacement contract changed')
          core.write_text(text.replace(old_score, new_score).replace(old_vpm, new_vpm), encoding='utf-8')

          transformations = Path('packages/video/src/zeromodel/video/domains/video_action_set/transformations.py')
          text = transformations.read_text(encoding='utf-8')
          old = '    _validate_transformation_parameters(params, image_shape=tuple(source.shape))\n'
          new = '''    _validate_transformation_parameters(
              params,
              image_shape=(int(source.shape[0]), int(source.shape[1])),
          )
          '''.replace('          ', '    ')
          if text.count(old) != 1:
              raise SystemExit('transformation shape replacement contract changed')
          transformations.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Commit shape typing corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/core/src/zeromodel/core/artifact.py packages/video/src/zeromodel/video/domains/video_action_set/transformations.py
          git commit -m "fix: make image shapes statically two-dimensional"
          git push origin HEAD:fix/pre-audit-main-stabilization
