name: PR 71 apply review fixes

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.number == 71 && github.event.pull_request.head.ref == 'fix/pre-audit-main-stabilization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pre-audit-main-stabilization
          fetch-depth: 0
      - name: Apply review repair patch
        run: |
          cat .github/pr71-patch.part00 \
              .github/pr71-patch.part01 \
              .github/pr71-patch.part02 > /tmp/pr71-fixes.patch
          git apply --check /tmp/pr71-fixes.patch
          git apply /tmp/pr71-fixes.patch
      - name: Regenerate current architecture inventory
        env:
          ZEROMODEL_INVENTORY_BASELINE: ${{ github.event.pull_request.head.sha }}
          ZEROMODEL_INVENTORY_DIRTY: "true"
        run: python scripts/analyze_package_inventory.py --write
      - name: Remove temporary repair machinery
        run: |
          rm -f .github/pr71-patch.part00
          rm -f .github/pr71-patch.part01
          rm -f .github/pr71-patch.part02
          rm -f .github/workflows/pr71-workspace-export.yml
      - name: Commit consolidated review fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close PR review blockers"
          git push origin HEAD:fix/pre-audit-main-stabilization
