name: TestPyPI release-candidate build check (publishing disabled)

# This workflow previously tried to publish a single monolithic `zeromodel`
# distribution built from the repository root. The repository root is no
# longer a buildable distribution (it was split into six workspace
# packages), so publishing was disabled here rather than left pointed at a
# build target that cannot succeed.
#
# This workflow currently only builds and twine-checks the six workspace
# distributions, as a manually triggerable dry run. Six-package TestPyPI/PyPI
# publication is intentionally deferred to a dedicated release-process
# remediation stage (see docs/reviews/post-split-main-audit.md finding F8 and
# docs/reviews/post-split-stage-a1-validation.md) and is not implemented here.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check:
    name: build and check six-package distributions (no publish)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source and wheel distributions for all six packages
        run: |
          set -e
          for pkg in core analysis observation vision video sqlalchemy; do
            python -m build "packages/$pkg"
          done

      - name: Check distribution metadata
        run: |
          set -e
          for pkg in core analysis observation vision video sqlalchemy; do
            python -m twine check "packages/$pkg/dist/"*
          done
