name: Python package

on:
  pull_request:
    paths:
      - "zeromodel/**"
      - "tests/**"
      - "scripts/**"
      - "examples/**"
      - "docs/examples/**"
      - "docs/architecture/**"
      - "scripts/**"
      - "pyproject.toml"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/release.md"
      - ".github/workflows/python.yml"
      - ".github/workflows/publish-testpypi.yml"
  push:
    branches:
      - main
    paths:
      - "zeromodel/**"
      - "tests/**"
      - "scripts/**"
      - "examples/**"
      - "docs/examples/**"
      - "docs/architecture/**"
      - "scripts/**"
      - "pyproject.toml"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/release.md"
      - ".github/workflows/python.yml"
      - ".github/workflows/publish-testpypi.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: repository quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install quality tools
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q .[dev]

      - name: Run repository quality gate
        id: quality_gate
        continue-on-error: true
        run: |
          mkdir -p build/ci
          python scripts/check_quality.py > build/ci/quality.log 2>&1

      - name: Upload quality failure log
        if: steps.quality_gate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: repository-quality-failure
          path: build/ci/quality.log
          if-no-files-found: error
          retention-days: 7

      - name: Apply one-time Ruff remediation to PR branch
        if: >-
          steps.quality_gate.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git fetch origin "$HEAD_BRANCH"
          git checkout -B "$HEAD_BRANCH" "origin/$HEAD_BRANCH"
          python -m ruff format \
            zeromodel/db/orm/video_action_set.py \
            zeromodel/db/session.py \
            zeromodel/db/stores/video_action_set.py \
            zeromodel/domains/video_action_set/_datetime_compat.py \
            zeromodel/domains/video_action_set/final_historical_authority.py \
            zeromodel/domains/video_action_set/observation_dto.py \
            zeromodel/stores/video_action_set_memory.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            zeromodel/db/orm/video_action_set.py \
            zeromodel/db/session.py \
            zeromodel/db/stores/video_action_set.py \
            zeromodel/domains/video_action_set/_datetime_compat.py \
            zeromodel/domains/video_action_set/final_historical_authority.py \
            zeromodel/domains/video_action_set/observation_dto.py \
            zeromodel/stores/video_action_set_memory.py
          if ! git diff --cached --quiet; then
            git commit -m "style: format release files"
            git push origin "HEAD:$HEAD_BRANCH"
          fi

      - name: Fail repository quality job
        if: steps.quality_gate.outcome == 'failure'
        run: exit 1

  package-tests:
    name: package tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -e .[dev]

      - name: Run complete bounded fast suite
        id: fast_suite
        continue-on-error: true
        run: |
          mkdir -p build/ci
          python scripts/run_fast_tests.py > build/ci/fast-suite.log 2>&1

      - name: Upload fast-suite failure log
        if: steps.fast_suite.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fast-suite-python-${{ matrix.python-version }}-failure
          path: build/ci/fast-suite.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail package test job
        if: steps.fast_suite.outcome == 'failure'
        run: exit 1

  lua-edge:
    name: Lua edge policy fixture
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python package and Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          python -m pip install -q --upgrade pip
          python -m pip install -q -e .[dev]

      - name: Test Lua exporter
        run: python -m pytest -q tests/test_lua_policy.py

      - name: Export arcade policy for Lua
        run: |
          python examples/lua_edge_policy.py \
            --output build/lua/arcade_policy.lua

      - name: Run arcade policy in Lua
        run: |
          lua5.4 examples/lua/run_arcade_policy.lua \
            build/lua/arcade_policy.lua

  package-build:
    name: build distribution artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -e .[release]

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*
