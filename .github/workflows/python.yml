name: Python package

on:
  pull_request:
    paths:
      - "zeromodel/**"
      - "tests/**"
      - "examples/**"
      - "docs/examples/**"
      - "pyproject.toml"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/release.md"
      - ".github/workflows/python.yml"
      - ".github/workflows/publish-testpypi.yml"
  push:
    branches:
      - main
    paths:
      - "zeromodel/**"
      - "tests/**"
      - "examples/**"
      - "docs/examples/**"
      - "pyproject.toml"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/release.md"
      - ".github/workflows/python.yml"
      - ".github/workflows/publish-testpypi.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-tests:
    name: package tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run package tests
        run: pytest -q

  lua-edge:
    name: Lua edge policy fixture
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python package and Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Test Lua exporter
        run: pytest -q tests/test_lua_policy.py

      - name: Export arcade policy for Lua
        run: |
          python examples/lua_edge_policy.py \
            --output build/lua/arcade_policy.lua

      - name: Run arcade policy in Lua
        run: |
          lua5.4 examples/lua/run_arcade_policy.lua \
            build/lua/arcade_policy.lua

  package-build:
    name: build distribution artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[release]

      - name: Build source and wheel distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*
