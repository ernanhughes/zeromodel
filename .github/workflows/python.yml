name: Python package

on:
  pull_request:
    paths:
      - "packages/**"
      - "tests/**"
      - "integration_tests/**"
      - "scripts/**"
      - "examples/**"
      - "docs/examples/**"
      - "docs/architecture/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "package-boundaries.toml"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/release.md"
      - ".github/workflows/python.yml"
      - ".github/workflows/publish-testpypi.yml"
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "tests/**"
      - "integration_tests/**"
      - "scripts/**"
      - "examples/**"
      - "docs/examples/**"
      - "docs/architecture/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "package-boundaries.toml"
      - "AGENTS.md"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/release.md"
      - ".github/workflows/python.yml"
      - ".github/workflows/publish-testpypi.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: repository quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install quality tools
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements-dev.txt

      - name: Run repository quality gate
        id: quality_gate
        continue-on-error: true
        run: |
          mkdir -p build/ci
          python scripts/check_quality.py > build/ci/quality.log 2>&1

      - name: Upload quality failure log
        if: steps.quality_gate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: repository-quality-failure
          path: build/ci/quality.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail repository quality job
        if: steps.quality_gate.outcome == 'failure'
        run: exit 1

  package-tests:
    name: package tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test tools
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements-dev.txt

      - name: Run complete bounded fast suite
        id: fast_suite
        continue-on-error: true
        run: |
          mkdir -p build/ci
          python scripts/run_fast_tests.py > build/ci/fast-suite.log 2>&1

      - name: Upload fast-suite failure log
        if: steps.fast_suite.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fast-suite-python-${{ matrix.python-version }}-failure
          path: build/ci/fast-suite.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail package test job
        if: steps.fast_suite.outcome == 'failure'
        run: exit 1

  lua-edge:
    name: Lua edge policy fixture
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python package and Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements-dev.txt

      - name: Test Lua exporter
        run: python -m pytest -q packages/core/tests/test_policy_lookup_lua.py

      - name: Export arcade policy for Lua
        run: |
          python examples/lua_edge_policy.py \
            --output build/lua/arcade_policy.lua

      - name: Run arcade policy in Lua
        run: |
          lua5.4 examples/lua/run_arcade_policy.lua \
            build/lua/arcade_policy.lua

  package-build:
    name: build distribution artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q build twine

      - name: Build source and wheel distributions for all six packages
        run: |
          set -e
          for pkg in core analysis observation vision video sqlalchemy; do
            python -m build "packages/$pkg"
          done

      - name: Check distribution metadata
        run: |
          set -e
          for pkg in core analysis observation vision video sqlalchemy; do
            python -m twine check "packages/$pkg/dist/"*
          done
