name: trust-package

on:
  push:
    paths:
      - "packages/core/**"
      - "packages/artifacts/**"
      - "packages/trust/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/trust-package.yml"
  pull_request:
    paths:
      - "packages/core/**"
      - "packages/artifacts/**"
      - "packages/trust/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/trust-package.yml"

jobs:
  validate-trust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest ruff mypy "numpy<2.0" "cryptography>=41"
      - name: Build dependency and Trust wheels
        run: |
          python -m build packages/core
          python -m twine check packages/core/dist/*
          python -m build packages/artifacts
          python -m twine check packages/artifacts/dist/*
          python -m build packages/trust
          python -m twine check packages/trust/dist/*
      - name: Lint and type-check Trust package
        run: |
          python -m ruff check packages/trust/src packages/trust/tests
          python -m ruff format --check packages/trust/src packages/trust/tests
          python -m mypy packages/trust/src
      - name: Check package boundaries
        run: python scripts/check_package_boundaries.py
      - name: Install wheels in clean environment
        shell: pwsh
        run: |
          python -m venv build/trust-ci-venv
          $python = "build/trust-ci-venv/Scripts/python.exe"
          & $python -m pip install --upgrade pip
          & $python -m pip install pytest
          & $python -m pip install packages/core/dist/zeromodel-1.0.13-py3-none-any.whl
          & $python -m pip install packages/artifacts/dist/zeromodel_artifacts-1.0.13-py3-none-any.whl
          & $python -m pip install packages/trust/dist/zeromodel_trust-1.0.13-py3-none-any.whl
          & $python -m pip check
          & $python -m pytest -q packages/trust/tests
      - name: Verify installed import locations
        shell: pwsh
        run: |
          $python = "build/trust-ci-venv/Scripts/python.exe"
          & $python -c "import inspect, zeromodel.core, zeromodel.artifacts, zeromodel.trust; print(inspect.getfile(zeromodel.core)); print(inspect.getfile(zeromodel.artifacts)); print(inspect.getfile(zeromodel.trust))"
