name: Video diagnostics

on:
  pull_request:
    paths:
      - "zeromodel/video.py"
      - "zeromodel/video_policy.py"
      - "zeromodel/policy_transitions.py"
      - "tests/test_video_source.py"
      - "tests/test_video_policy.py"
      - "tests/test_policy_transitions.py"
      - "examples/arcade_visual_video_baseline.py"
      - ".github/workflows/video-diagnostics.yml"

permissions:
  contents: read

jobs:
  full-suite-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Capture full pytest output
        id: full
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short > full-test-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 120 full-test-output.txt
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: full-test-output
          path: full-test-output.txt
          if-no-files-found: error
      - name: Enforce full test result
        run: test "${{ steps.full.outputs.exit_code }}" = "0"
