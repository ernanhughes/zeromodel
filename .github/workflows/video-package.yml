name: video-package

on:
  push:
    paths:
      - "packages/core/**"
      - "packages/observation/**"
      - "packages/video/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/video-package.yml"
  pull_request:
    paths:
      - "packages/core/**"
      - "packages/observation/**"
      - "packages/video/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/video-package.yml"

jobs:
  validate-video:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest ruff mypy numpy
      - name: Build dependency and video wheels
        run: |
          python -m build packages/core
          python -m twine check packages/core/dist/*
          python -m build packages/observation
          python -m twine check packages/observation/dist/*
          python -m build packages/video
          python -m twine check packages/video/dist/*
      - name: Lint and type-check video
        run: |
          python -m ruff check packages/video/src packages/video/tests
          python -m ruff format --check packages/video/src packages/video/tests
          python -m mypy packages/video/src
      - name: Check package boundaries
        run: python scripts/check_package_boundaries.py
      - name: Install wheels in clean environment
        shell: pwsh
        run: |
          python -m venv build/video-ci-venv
          $python = "build/video-ci-venv/Scripts/python.exe"
          & $python -m pip install --upgrade pip
          & $python -m pip install pytest
          & $python -m pip install packages/core/dist/zeromodel-1.0.13-py3-none-any.whl
          & $python -m pip install packages/observation/dist/zeromodel_observation-1.0.13-py3-none-any.whl
          & $python -m pip install packages/video/dist/zeromodel_video-1.0.13-py3-none-any.whl
          & $python -m pip check
          $env:VIDEO_WHEEL_PATH = "$PWD/packages/video/dist/zeromodel_video-1.0.13-py3-none-any.whl"
          & $python -m pytest -q packages/video/tests
      - name: Verify installed import locations
        shell: pwsh
        run: |
          $python = "build/video-ci-venv/Scripts/python.exe"
          & $python -c "import inspect, zeromodel.core, zeromodel.observation, zeromodel.video; print(inspect.getfile(zeromodel.core)); print(inspect.getfile(zeromodel.observation)); print(inspect.getfile(zeromodel.video))"
