name: vision-package

on:
  push:
    paths:
      - "packages/core/**"
      - "packages/observation/**"
      - "packages/vision/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/vision-package.yml"
  pull_request:
    paths:
      - "packages/core/**"
      - "packages/observation/**"
      - "packages/vision/**"
      - "scripts/check_package_boundaries.py"
      - "package-boundaries.toml"
      - "pyproject.toml"
      - ".github/workflows/vision-package.yml"

jobs:
  validate-vision:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest ruff mypy numpy
      - name: Build dependency and vision wheels
        run: |
          python -m build packages/core
          python -m twine check packages/core/dist/*
          python -m build packages/observation
          python -m twine check packages/observation/dist/*
          python -m build packages/vision
          python -m twine check packages/vision/dist/*
      - name: Lint and type-check vision
        run: |
          python -m ruff check packages/vision/src packages/vision/tests
          python -m ruff format --check packages/vision/src packages/vision/tests
          python -m mypy packages/vision/src
      - name: Check package boundaries
        run: python scripts/check_package_boundaries.py
      - name: Install wheels in clean environment
        shell: pwsh
        run: |
          python -m venv build/vision-ci-venv
          $python = "build/vision-ci-venv/Scripts/python.exe"
          & $python -m pip install --upgrade pip
          & $python -m pip install pytest
          & $python -m pip install packages/core/dist/zeromodel-1.0.13-py3-none-any.whl
          & $python -m pip install packages/observation/dist/zeromodel_observation-1.0.13-py3-none-any.whl
          & $python -m pip install packages/vision/dist/zeromodel_vision-1.0.13-py3-none-any.whl
          & $python -m pip check
          $env:VISION_WHEEL_PATH = "$PWD/packages/vision/dist/zeromodel_vision-1.0.13-py3-none-any.whl"
          & $python -m pytest -q packages/vision/tests
      - name: Verify installed import locations
        shell: pwsh
        run: |
          $python = "build/vision-ci-venv/Scripts/python.exe"
          & $python -c "import inspect, zeromodel.core, zeromodel.observation, zeromodel.vision; print(inspect.getfile(zeromodel.core)); print(inspect.getfile(zeromodel.observation)); print(inspect.getfile(zeromodel.vision))"
