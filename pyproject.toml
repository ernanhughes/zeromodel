[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
testpaths = ["tests", "integration_tests"]
pythonpath = [
    "packages/core/src",
    "packages/analysis/src",
    "packages/observation/src",
    "packages/vision/src",
    "packages/perception/src",
    "packages/video/src",
    "packages/sqlalchemy/src",
    "packages/artifacts/src",
    "packages/trust/src",
    "packages/navigation/src",
    ".",
]
addopts = "--strict-markers"
markers = [
    "fast: bounded, deterministic production tests with no network, credentials, or heavyweight downloads",
    "slow: supported production tests that exceed the fast-suite time budget, including exhaustive sweeps, profiling, full builds, and mutation audits",
    "integration: cross-package production behavior or tests requiring multiple production distributions",
    "external: tests requiring credentials, services, external files, remote models, GPUs, or environment-specific infrastructure",
    "research: scientific benchmark, evidence, experiment, parameter-sweep, arcade closed-world proof, negative-result provider, or unpromoted implementation test",
]

[tool.ruff]
line-length = 88

[tool.mypy]
python_version = "3.10"
mypy_path = ["packages/core/src", "packages/analysis/src", "packages/observation/src", "packages/vision/src", "packages/perception/src", "packages/video/src", "packages/sqlalchemy/src", "packages/artifacts/src", "packages/trust/src", "packages/navigation/src"]
explicit_package_bases = true
