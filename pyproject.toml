[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
testpaths = ["tests", "integration_tests"]
pythonpath = [
    "packages/core/src",
    "packages/analysis/src",
    "packages/observation/src",
    "packages/vision/src",
    "packages/video/src",
    "packages/sqlalchemy/src",
    ".",
]
addopts = "--strict-markers"
markers = [
    "integration: end-to-end, persistence, materialization, or cross-component tests excluded from normal development",
    "slow: tests normally too expensive for the fast suite, including exhaustive sweeps, profiling, full builds, and mutation audits",
]

[tool.ruff]
line-length = 88

[tool.mypy]
python_version = "3.10"
mypy_path = ["packages/core/src", "packages/analysis/src", "packages/observation/src", "packages/vision/src"]
explicit_package_bases = true
